    <style>
        .post-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;

            padding-bottom: 80px;
        }

        .post-content p {
            font-family: 'Lora', Georgia, serif;
            font-weight: 400;

            color: #d1d5db;
        }

        .post-content h2 {
            font-family: 'Lora', Georgia, serif;
            font-weight: 600;
            font-size: 32px;
            color: #ffffff;
            margin-top: 40px;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .post-content h3 {
            font-family: 'Lora', Georgia, serif;
            font-weight: 600;
            font-size: 24px;
            color: #ffffff;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .hero-title {
            font-family: 'Lora', Georgia, serif !important;
            font-weight: 600 !important;
            text-align: center;
        }

        .hero-subtitle {
            font-family: 'Lora', Georgia, serif !important;
            font-weight: 400 !important;
            text-align: center;
        }

        .post-content em {
            font-family: 'Lora', Georgia, serif;
            font-style: italic;
            font-weight: 500;
        }

        .post-content strong {
            font-family: 'Lora', Georgia, serif;
            font-style: normal;
            font-weight: 600;
            color: #f1f5f9;
            transition: color 0.4s ease;
        }

        .post-content strong em,
        .post-content em strong {
            font-family: 'Lora', Georgia, serif;
            font-style: italic;
            font-weight: 600;
            color: #f1f5f9;
            transition: color 0.4s ease;
        }

        .post-content u {
            font-family: 'Lora', Georgia, serif;
            font-weight: 400;
            font-style: normal;
            text-decoration: underline;
            text-decoration-color: #ffffff;
            text-underline-offset: 3px;
            text-decoration-thickness: 1.25px;
        }

        .post-cover {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            margin: 0 auto 40px auto;
        }

        .post-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .post-cover {
                aspect-ratio: 4 / 3;
            }

            .hero-section--post {
                padding: 12px 0 8px !important;
                margin-top: 0 !important;
                margin-bottom: 8px !important;
                gap: 6px !important;
            }
        }
    </style>
