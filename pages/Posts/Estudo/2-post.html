<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título do Novo Post | Estudo | Posts</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <!-- MathJax -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        /* Tipografia customizada para posts, complementando o style.css base */
        .post-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 80px;
        }

        .post-content p {
            font-size: 18px;
            line-height: 1.8;
            color: #d1d5db;
        }

        .post-content h2 {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 40px;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .post-content h3 {
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .post-cover {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            margin: 0 auto 40px auto;
        }

        .post-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .post-cover {
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="left-header">
            <button id="btn-toggle-sidebar" class="icon-btn" title="Fechar barra lateral">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
            <div class="logo">
                The Journal of a Physicist
            </div>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn theme-btn" title="Alternar tema">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <a href="../../../index.html">Principal</a>
            </div>
            <div class="sidebar-section">
                <a href="#">Currículo</a>
            </div>
            <div class="sidebar-section">
                <a href="../../Research.html">Pesquisa</a>
            </div>
            <div class="sidebar-section">
                <a href="../../Projects.html">Projetos</a>
            </div>
            <div class="sidebar-section">
                <a href="../../Lectures.html">Lectures</a>
            </div>
            <div class="sidebar-section">
                <a href="../../Posts.html">Posts</a>
            </div>
        </aside>

        <main class="main-content">
            <!-- Formato Hero para Posts -->
            <div class="hero-section" style="min-height: 20vh; margin-bottom: 20px;">
                <h1 class="hero-title">Art, Science and Technology</h1>

                <p class="hero-subtitle">
                    [Data] • Postagem
                </p>
            </div>

            <!-- Imagem de Apresentação -->
            <div class="post-cover">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Bronnikov_gimnpifagoreizev.jpg/1920px-Bronnikov_gimnpifagoreizev.jpg"
                    alt="Capa do post">
            </div>


            <!-- Conteúdo Textual -->
            <div class="post-content">

                <p>
                    [Text]
                </p>
            </div>
        </main>
    </div>

    <script src="../../../assets/js/script.js"></script>
</body>

</html>
